name: release

# Build prebuilt binaries for every platform and attach them to the GitHub
# Release whenever a version tag (v*) is pushed. install.sh / install.ps1 and
# `lovax update` download these assets.
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: lovax-linux-x64
            flags: "-O3 -fno-gcse -fno-crossjumping -static"
          - os: macos-13          # Intel runner
            asset: lovax-macos-x64
            flags: "-O3 -fno-gcse -fno-crossjumping"
          - os: macos-latest      # Apple Silicon runner
            asset: lovax-macos-arm64
            flags: "-O3 -fno-gcse -fno-crossjumping"
          - os: windows-latest
            asset: lovax-windows-x64.exe
            flags: "-O2"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Build (POSIX)
        if: runner.os != 'Windows'
        run: |
          g++ -std=c++17 ${{ matrix.flags }} -o "${{ matrix.asset }}" src/main.cpp
          cp "${{ matrix.asset }}" lovax   # the test runner invokes ./lovax
          ./tests/run_tests.sh
          shasum -a 256 "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          g++ -std=c++17 ${{ matrix.flags }} -o "${{ matrix.asset }}" src/main.cpp
          certutil -hashfile "${{ matrix.asset }}" SHA256 | sed -n '2p' | tr -d ' \r' > "${{ matrix.asset }}.sha256"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            ${{ matrix.asset }}
            ${{ matrix.asset }}.sha256

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { path: dist, merge-multiple: true }
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
